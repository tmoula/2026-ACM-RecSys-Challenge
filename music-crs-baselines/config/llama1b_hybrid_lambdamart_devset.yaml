# Devset eval: hybrid pool 1000 + retrained LambdaMART (no LM — use evaluate_rerank_ndcg_devset.py).
lm_type: meta-llama/Llama-3.2-1B-Instruct
retrieval_type: hybrid
test_dataset_name: talkpl-ai/TalkPlayData-Challenge-Dataset
item_db_name: talkpl-ai/TalkPlayData-Challenge-Track-Metadata
user_db_name: talkpl-ai/TalkPlayData-Challenge-User-Metadata
track_split_types:
- all_tracks
user_split_types:
- all_users
corpus_types:
- track_name
- artist_name
- album_name
- tag_list
- release_date
retrieve_topk: 1000
final_topk: 20
include_user_profile_in_retrieval: true
response_topk: 3
generation_mode: grounded
max_response_tokens: 160
reranker_type: lambdamart
reranker_kwargs:
  model_path: ./cache/reranker/lambdamart_hybrid_model.txt
retrieval_kwargs:
  pool_topk: 1000
  rrf_k: 60
  dense_kwargs:
    model_name: ./checkpoints/bge-talkplay-v5-bs32
    max_length: 512
    query_prefix: "Represent this sentence for searching relevant passages: "
    passage_prefix: ""
cache_dir: ./cache
device: cuda
attn_implementation: eager
