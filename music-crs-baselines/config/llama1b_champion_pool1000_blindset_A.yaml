# v7 champion + wider dense pool (retrieve_topk). Fallback: llama1b_champion_lambdamart_gpt_blindset_A (pool 200).
lm_type: gpt-4o-mini
retrieval_type: dense
test_dataset_name: talkpl-ai/TalkPlayData-Challenge-Blind-A
item_db_name: talkpl-ai/TalkPlayData-Challenge-Track-Metadata
user_db_name: talkpl-ai/TalkPlayData-Challenge-User-Metadata
track_split_types:
- all_tracks
user_split_types:
- all_users
corpus_types:
- track_name
- artist_name
- album_name
- tag_list
- release_date
retrieve_topk: 1000
final_topk: 20
include_user_profile_in_retrieval: true
response_topk: 3
generation_mode: gpt_curator
max_response_tokens: 160
reranker_type: lambdamart
reranker_kwargs:
  model_path: ./cache/reranker/lambdamart_model.txt
lm_kwargs:
  model_name: gpt-4o-mini
  temperature: 0.75
  top_p: 0.92
  frequency_penalty: 0.45
  presence_penalty: 0.35
  fewshot_pool_path: ./cache/generation/fewshot_pool.json
  num_fewshot: 2
retrieval_kwargs:
  model_name: ./checkpoints/bge-talkplay-v5-bs32
  max_length: 512
  query_prefix: "Represent this sentence for searching relevant passages: "
  passage_prefix: ""
cache_dir: ./cache
device: cuda
attn_implementation: eager
