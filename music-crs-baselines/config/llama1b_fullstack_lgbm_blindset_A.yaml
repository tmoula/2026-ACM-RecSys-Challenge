lm_type: meta-llama/Llama-3.2-1B-Instruct
retrieval_type: fullstack
test_dataset_name: talkpl-ai/TalkPlayData-Challenge-Blind-A
item_db_name: talkpl-ai/TalkPlayData-Challenge-Track-Metadata
user_db_name: talkpl-ai/TalkPlayData-Challenge-User-Metadata
track_split_types:
- all_tracks
user_split_types:
- all_users
corpus_types:
- track_name
- artist_name
- album_name
- tag_list
- release_date
retrieve_topk: 500
final_topk: 20
include_user_profile_in_retrieval: true
response_topk: 3
generation_mode: grounded
max_response_tokens: 160
reranker_type: lgbm
reranker_kwargs:
  model_path: ./cache/reranker/lgbm_model.txt
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  batch_size: 32
  ce_topk: 200
  use_cross_encoder: true
retrieval_kwargs:
  pool_topk: 500
  rrf_k: 60
  dense_kwargs:
    model_name: ./checkpoints/bge-talkplay-v5-bs32
    max_length: 512
    query_prefix: "Represent this sentence for searching relevant passages: "
    passage_prefix: ""
cache_dir: ./cache
device: cuda
attn_implementation: eager
